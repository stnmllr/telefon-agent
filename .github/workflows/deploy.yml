name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          gcloud config set project boxwood-mantra-489408-c0
          gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t europe-west3-docker.pkg.dev/boxwood-mantra-489408-c0/cloud-run-source-deploy/telefon-agent:${{ github.sha }} .
          docker push europe-west3-docker.pkg.dev/boxwood-mantra-489408-c0/cloud-run-source-deploy/telefon-agent:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy telefon-agent \
            --image europe-west3-docker.pkg.dev/boxwood-mantra-489408-c0/cloud-run-source-deploy/telefon-agent:${{ github.sha }} \
            --region europe-west3 \
            --project boxwood-mantra-489408-c0 \
            --quiet
